version: '3'

includes:
  reuse: ../../../../reuse.Taskfile.yml

vars:
  INTEGRATION_TEST_IDENTIFIER: 'Integration'
  SCAFFOLDING_VERSION: 'v0.7.31'
  SIGSTORE_ENV_FILE: 'tmp/sigstore-env.sh'

tasks:
  scaffolding:setup:
    desc: "Create kind cluster and deploy sigstore scaffolding (~5 min, skips if already running)"
    preconditions:
      - sh: '[ "$(uname -s)" = "Linux" ] || grep -q "registry.local" /etc/hosts'
        msg: |
          /etc/hosts is missing the registry.local entry required by kind.
          On macOS, add it manually (one-time setup):
            echo '127.0.0.1 registry.local' | sudo tee -a /etc/hosts
    status:
      - kubectl -n fulcio-system get ksvc fulcio -ojsonpath='{.status.url}' 2>/dev/null | grep -q .
      - kubectl -n rekor-system get ksvc rekor -ojsonpath='{.status.url}' 2>/dev/null | grep -q .
      - kubectl -n tsa-system get ksvc tsa -ojsonpath='{.status.url}' 2>/dev/null | grep -q .
      - kubectl -n default get ksvc gettoken -ojsonpath='{.status.url}' 2>/dev/null | grep -q .
    cmds:
      - mkdir -p tmp
      - |
        curl -fLo tmp/setup-kind.sh \
          "https://github.com/sigstore/scaffolding/releases/download/{{.SCAFFOLDING_VERSION}}/setup-kind.sh"
        chmod u+x tmp/setup-kind.sh
        cd tmp && ./setup-kind.sh
      - |
        curl -fLo tmp/setup-scaffolding-from-release.sh \
          "https://github.com/sigstore/scaffolding/releases/download/{{.SCAFFOLDING_VERSION}}/setup-scaffolding-from-release.sh"
        chmod u+x tmp/setup-scaffolding-from-release.sh
        tmp/setup-scaffolding-from-release.sh --release-version {{.SCAFFOLDING_VERSION}}
      - |
        curl -fL "https://github.com/sigstore/scaffolding/releases/download/{{.SCAFFOLDING_VERSION}}/testrelease.yaml" \
          | kubectl create -f -
        kubectl wait --timeout 2m --for=condition=Ready ksvc gettoken

  scaffolding:env:
    desc: "Extract sigstore env vars from running cluster into tmp/sigstore-env.sh"
    deps: [scaffolding:setup]
    cmds:
      - mkdir -p tmp
      - bash hack/extract-sigstore-env.sh > {{.SIGSTORE_ENV_FILE}}

  test/integration:
    desc: "Run sigstore integration tests against scaffolding cluster"
    deps: [scaffolding:env]
    cmds:
      - |
        set -e
        . {{.SIGSTORE_ENV_FILE}}
        go test -count=1 -run "{{.INTEGRATION_TEST_IDENTIFIER}}" -timeout 180s ./...

  scaffolding:teardown:
    desc: "Delete kind cluster and clean up"
    cmds:
      - kind delete cluster 2>/dev/null || true
      - rm -rf tmp

  # ---------------------------------------------------------------------------
  # Local (macOS) developer workflow
  # ---------------------------------------------------------------------------
  # On macOS with Colima or Docker Desktop the MetalLB IPs assigned by Kourier
  # are not routable from the host.  These tasks use kubectl port-forward to
  # expose the Knative services on localhost instead.

  scaffolding:port-forward:
    desc: "Port-forward scaffolding Knative services to localhost (macOS)"
    deps: [scaffolding:setup]
    cmds:
      - bash hack/port-forward.sh

  scaffolding:port-forward:start:
    desc: "Start port-forwards in the background"
    deps: [scaffolding:setup]
    cmds:
      - bash hack/port-forward.sh --bg

  scaffolding:port-forward:stop:
    desc: "Stop backgrounded port-forwards"
    cmds:
      - bash hack/port-forward.sh --stop

  scaffolding:env:local:
    desc: "Extract sigstore env vars using localhost URLs (requires scaffolding:port-forward:start)"
    deps: [scaffolding:setup]
    cmds:
      - mkdir -p tmp
      - bash hack/extract-sigstore-env.sh --local > {{.SIGSTORE_ENV_FILE}}

  test/integration:local:
    desc: "Run integration tests against port-forwarded scaffolding (macOS)"
    deps: [scaffolding:env:local]
    cmds:
      - |
        set -e
        . {{.SIGSTORE_ENV_FILE}}
        go test -count=1 -run "{{.INTEGRATION_TEST_IDENTIFIER}}" -timeout 180s ./...
