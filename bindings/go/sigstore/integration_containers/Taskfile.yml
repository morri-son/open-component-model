version: '3'

includes:
  reuse: ../../../../reuse.Taskfile.yml

vars:
  INTEGRATION_TEST_IDENTIFIER: 'Integration'
  SCAFFOLDING_VERSION: 'v0.7.31'
  # CLONE_DIR is passed to the upstream run-containers.sh script so artifacts
  # are written to a predictable location instead of a random temp directory.
  CLONE_DIR: '{{.ROOT_DIR}}/tmp/sigstore-containers'
  SIGSTORE_ENV_FILE: 'tmp/sigstore-env.sh'

tasks:
  containers:setup:
    desc: "Start the container-based sigstore environment (downloads upstream scripts)"
    preconditions:
      - sh: 'command -v docker >/dev/null 2>&1'
        msg: "docker must be installed and on PATH"
      - sh: 'docker info >/dev/null 2>&1'
        msg: "Docker daemon must be running"
    status:
      # Skip if fakeoidc container is already running
      - docker inspect --format '{{`{{.State.Running}}`}}' fakeoidc 2>/dev/null | grep -q true
    cmds:
      - mkdir -p tmp
      - |
        # Download the upstream run-containers.sh script from the release tag.
        curl -fLo /tmp/run-containers.sh \
          "https://raw.githubusercontent.com/sigstore/scaffolding/{{.SCAFFOLDING_VERSION}}/actions/setup-sigstore-env/run-containers.sh"
        chmod u+x /tmp/run-containers.sh
      - |
        # Download the upstream build-trusted-root.sh script (sourced by run-containers.sh).
        curl -fLo /tmp/build-trusted-root.sh \
          "https://raw.githubusercontent.com/sigstore/scaffolding/{{.SCAFFOLDING_VERSION}}/actions/setup-sigstore-env/build-trusted-root.sh"
        chmod u+x /tmp/build-trusted-root.sh
      - |
        # Download the Dockerfile.cosign used by build-trusted-root.sh.
        curl -fLo /tmp/Dockerfile.cosign \
          "https://raw.githubusercontent.com/sigstore/scaffolding/{{.SCAFFOLDING_VERSION}}/actions/setup-sigstore-env/Dockerfile.cosign"
      - |
        # Download the fakeoidc directory (run-containers.sh does pushd ./fakeoidc).
        mkdir -p /tmp/fakeoidc
        for f in Dockerfile docker-compose.yml go.mod go.sum main.go; do
          curl -fLo "/tmp/fakeoidc/$f" \
            "https://raw.githubusercontent.com/sigstore/scaffolding/{{.SCAFFOLDING_VERSION}}/actions/setup-sigstore-env/fakeoidc/$f"
        done
      - |
        # Source the upstream script (it must be sourced, not executed, because
        # it exports env vars and uses "return" instead of "exit").
        export CLONE_DIR="{{.CLONE_DIR}}"
        cd /tmp && source ./run-containers.sh

  containers:env:
    desc: "Extract env vars from running container environment into tmp/sigstore-env.sh"
    deps: [containers:setup]
    cmds:
      - mkdir -p tmp
      - |
        CLONE_DIR="{{.CLONE_DIR}}"

        # Fetch a fresh OIDC token (tokens expire after 30 minutes).
        OIDC_TOKEN=$(curl -sSf "http://localhost:8080/token")
        TRUSTED_ROOT="$CLONE_DIR/trusted_root.json"
        SIGNING_CONFIG="$CLONE_DIR/signing_config.json"

        emit_export() {
          local name="$1" val="$2"
          printf 'export %s=%q\n' "$name" "$val"
        }

        {
          emit_export SIGSTORE_OIDC_TOKEN    "$OIDC_TOKEN"
          emit_export SIGSTORE_TRUSTED_ROOT   "$TRUSTED_ROOT"
          emit_export SIGSTORE_SIGNING_CONFIG "$SIGNING_CONFIG"
          emit_export SIGSTORE_OIDC_ISSUER    "http://fakeoidc:8080"
          emit_export SIGSTORE_OIDC_IDENTITY  "foo@bar.com"
        } > {{.SIGSTORE_ENV_FILE}}

  test/integration:
    desc: "Run sigstore integration tests against container-based environment"
    deps: [containers:env]
    cmds:
      - |
        set -e
        . {{.SIGSTORE_ENV_FILE}}
        go test -count=1 -run "{{.INTEGRATION_TEST_IDENTIFIER}}" -timeout 180s ./...

  containers:teardown:
    desc: "Stop and remove all sigstore containers"
    cmds:
      - |
        CLONE_DIR="{{.CLONE_DIR}}"
        # Tear down all docker compose projects started by the upstream script
        for dir in "$CLONE_DIR"/fulcio "$CLONE_DIR"/rekor "$CLONE_DIR"/timestamp-authority "$CLONE_DIR"/rekor-tiles; do
          if [ -d "$dir" ] && [ -f "$dir/docker-compose.yml" ]; then
            cd "$dir" && docker compose down --volumes 2>/dev/null || true
          fi
        done
        # Stop fakeoidc container
        docker rm -f fakeoidc 2>/dev/null || true
      - rm -rf tmp
