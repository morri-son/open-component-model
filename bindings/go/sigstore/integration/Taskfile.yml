version: '3'

includes:
  reuse: ../../../../reuse.Taskfile.yml

vars:
  INTEGRATION_TEST_IDENTIFIER: 'Integration'

tasks:
  test/integration:
    desc: Setup Kind cluster, run Sigstore integration tests, tear down
    cmds:
      - task: kind/setup
      - defer: {task: kind/teardown}
      - task: _run-go-tests

  _run-go-tests:
    internal: true
    dotenv: ['{{.TASKFILE_DIR}}/hack/generated.env']
    cmds:
      - task: reuse:run-go-test
        vars:
          GO_TEST_FLAGS: '-run "{{ .INTEGRATION_TEST_IDENTIFIER }}" -timeout 120s'

  kind/setup:
    desc: Create a Kind cluster with the full Sigstore stack (v1 + v2)
    cmds:
      - ./hack/setup-kind-sigstore.sh

  kind/teardown:
    desc: Delete the Kind cluster (set SIGSTORE_KEEP_CLUSTER=true to skip)
    cmds:
      - cmd: ./hack/teardown-kind-sigstore.sh
        if: '[ "${SIGSTORE_KEEP_CLUSTER:-false}" != "true" ]'
