name: Publish OCM components

# Publishes ocm.software/{cli,controller,ocm} component-versions to GHCR.
# The CLI binary used to invoke `ocm add component-version` is the one this
# release just built — downloaded from `cli_artifact_name`. Image and chart
# artefacts referenced by the constructors are pinned by digest, not fetched.

on:
  workflow_call:
    inputs:
      version:
        description: "Bare semver, no leading 'v' (0.7.0 or 0.7.0-rc.1). Matches the OCI tags pipeline.yml pushes for the CLI/controller image and chart."
        required: true
        type: string
      cli_image_digest:
        description: "Digest of the multi-arch CLI OCI image already pushed to ghcr.io/<owner>/cli."
        required: true
        type: string
      controller_image_digest:
        description: "Digest of the controller image already pushed to ghcr.io/<owner>/kubernetes/controller."
        required: true
        type: string
      controller_chart_digest:
        description: "Digest of the Helm chart already pushed to ghcr.io/<owner>/kubernetes/controller/chart."
        required: true
        type: string
      cli_artifact_name:
        description: "Artifact name containing tmp/bin/ocm-<os>-<arch> for all platforms."
        required: true
        type: string
      conflict_policy:
        description: "'replace' (RC) for idempotent reruns; 'abort-and-fail' (final) for immutability."
        required: true
        type: string
      set_latest:
        description: "If true, also tag :latest on each published component-version."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ inputs.version }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Compute image refs and CLI binary path
        env:
          OWNER: ${{ github.repository_owner }}
          CLI_ASSETS: ${{ runner.temp }}/cli-assets
        run: |
          set -euo pipefail
          OWNER="${OWNER,,}"
          arch=$(dpkg --print-architecture)
          {
            echo "REPO_ROOT=$REGISTRY/$OWNER"
            echo "CLI_IMAGE_REF=$REGISTRY/$OWNER/cli:${{ inputs.version }}@${{ inputs.cli_image_digest }}"
            echo "CONTROLLER_IMAGE_REF=$REGISTRY/$OWNER/kubernetes/controller:${{ inputs.version }}@${{ inputs.controller_image_digest }}"
            echo "CONTROLLER_CHART_REF=$REGISTRY/$OWNER/kubernetes/controller/chart:${{ inputs.version }}@${{ inputs.controller_chart_digest }}"
            echo "CLI_BIN=$CLI_ASSETS/bin/ocm-linux-$arch"
          } >> "$GITHUB_ENV"

      - name: Checkout product constructor
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: product
          persist-credentials: false

      - name: Download CLI artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.cli_artifact_name }}
          path: ${{ runner.temp }}/cli-assets

      - name: Make CLI binaries executable
        env:
          CLI_ASSETS: ${{ runner.temp }}/cli-assets
        run: |
          set -euo pipefail
          chmod +x "$CLI_ASSETS"/bin/ocm-*
          test -x "$CLI_BIN"

      - name: Generate CLI component-constructor
        env:
          VERSION: ${{ inputs.version }}
          CLI_ASSETS: ${{ runner.temp }}/cli-assets
          OUT: ${{ runner.temp }}/cli-component-constructor.yaml
        run: |
          set -euo pipefail
          cat > "$OUT" <<EOF
          name: ocm.software/cli
          version: ${VERSION}
          provider:
            name: ocm.software
          resources:
            - name: cli
              type: executable
              version: ${VERSION}
              labels:
                - name: downloadName
                  value: ocm
              extraIdentity:
                os: linux
                architecture: amd64
              relation: local
              input:
                type: file
                path: ${CLI_ASSETS}/bin/ocm-linux-amd64
            - name: cli
              type: executable
              version: ${VERSION}
              labels:
                - name: downloadName
                  value: ocm
              extraIdentity:
                os: linux
                architecture: arm64
              relation: local
              input:
                type: file
                path: ${CLI_ASSETS}/bin/ocm-linux-arm64
            - name: cli
              type: executable
              version: ${VERSION}
              labels:
                - name: downloadName
                  value: ocm
              extraIdentity:
                os: darwin
                architecture: amd64
              relation: local
              input:
                type: file
                path: ${CLI_ASSETS}/bin/ocm-darwin-amd64
            - name: cli
              type: executable
              version: ${VERSION}
              labels:
                - name: downloadName
                  value: ocm
              extraIdentity:
                os: darwin
                architecture: arm64
              relation: local
              input:
                type: file
                path: ${CLI_ASSETS}/bin/ocm-darwin-arm64
            - name: cli
              type: executable
              version: ${VERSION}
              labels:
                - name: downloadName
                  value: ocm
              extraIdentity:
                os: windows
                architecture: amd64
              relation: local
              input:
                type: file
                path: ${CLI_ASSETS}/bin/ocm-windows-amd64
            - name: cli
              type: executable
              version: ${VERSION}
              labels:
                - name: downloadName
                  value: ocm
              extraIdentity:
                os: windows
                architecture: arm64
              relation: local
              input:
                type: file
                path: ${CLI_ASSETS}/bin/ocm-windows-arm64
            - name: image
              type: ociImage
              version: ${VERSION}
              relation: local
              access:
                type: ociArtifact
                imageReference: ${CLI_IMAGE_REF}
          EOF

      - name: Generate controller component-constructor
        env:
          VERSION: ${{ inputs.version }}
          OUT: ${{ runner.temp }}/controller-component-constructor.yaml
        run: |
          set -euo pipefail
          cat > "$OUT" <<EOF
          name: ocm.software/controller
          version: ${VERSION}
          provider:
            name: ocm.software
          resources:
            - name: image
              type: ociImage
              version: ${VERSION}
              relation: local
              access:
                type: ociArtifact
                imageReference: ${CONTROLLER_IMAGE_REF}
            - name: chart
              type: helmChart
              version: ${VERSION}
              relation: local
              access:
                type: ociArtifact
                imageReference: ${CONTROLLER_CHART_REF}
          EOF

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write OCM config
        run: |
          set -euo pipefail
          cat > "$HOME/.ocmconfig" <<EOF
          type: generic.config.ocm.software/v1
          configurations:
            - type: credentials.config.ocm.software
              repositories:
                - repository:
                    type: DockerConfig/v1
                    dockerConfigFile: $HOME/.docker/config.json
                    propagateConsumerIdentity: true
          EOF

      - name: Publish component-versions
        # Product constructor uses ${VERSION} env substitution (see ADR 0006);
        # the OCM CLI expands via os.Expand at ingest time.
        env:
          VERSION: ${{ inputs.version }}
          CONFLICT_POLICY: ${{ inputs.conflict_policy }}
          TMP: ${{ runner.temp }}
        run: |
          set -euo pipefail
          "$CLI_BIN" add component-version \
            --config "$HOME/.ocmconfig" \
            --repository "$REPO_ROOT" \
            --constructor "$TMP/cli-component-constructor.yaml" \
            --component-version-conflict-policy "$CONFLICT_POLICY"
          "$CLI_BIN" add component-version \
            --config "$HOME/.ocmconfig" \
            --repository "$REPO_ROOT" \
            --constructor "$TMP/controller-component-constructor.yaml" \
            --component-version-conflict-policy "$CONFLICT_POLICY"
          "$CLI_BIN" add component-version \
            --config "$HOME/.ocmconfig" \
            --repository "$REPO_ROOT" \
            --constructor product/component-constructor.yaml \
            --component-version-conflict-policy "$CONFLICT_POLICY"

      - name: Setup ORAS
        if: ${{ inputs.set_latest }}
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2

      - name: Tag :latest
        if: ${{ inputs.set_latest }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          for name in cli controller ocm; do
            oras tag "$REPO_ROOT/component-descriptors/ocm.software/$name:$VERSION" latest
          done
