<h3 id="why-now--v1--sovereignty-led">Why now — V1 · Sovereignty-led</h3>
<h1 id="sovereignty-is-no-longer-optional">Sovereignty is no longer optional</h1>
<div class="columns">
<div>
<h3 id="sovereignty-pressure">Sovereignty pressure</h3>
<p>Wherever the law puts the boundary — by jurisdiction, sector, or air-gap — software must be deliverable, verifiable, and operable inside it.</p>
</div>
<div>
<h3 id="regulation-tightening">Regulation tightening</h3>
<p>EU DORA · NIS2 · GDPR. Provable supply-chain control, not best effort.</p>
</div>
<div>
<h3 id="supply-chain-attacks-are-real">Supply-chain attacks are real</h3>
<p>SolarWinds. xz. log4shell. Signatures must survive the journey, or compliance is theatre.</p>
</div>
</div>
<div class="footer-line">Open Component Model · ocm.software</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-class="three-col with-footer" data-theme="ocm-neonephos" lang="de-DE" class="three-col with-footer" style="--class:three-col with-footer;--theme:ocm-neonephos;" data-size="16:9">
<h3 id="why-now--v2--supply-chain-led">Why now — V2 · Supply-chain-led</h3>
<h1 id="trust-must-travel-with-the-artifact">Trust must travel with the artifact</h1>
<div class="columns">
<div>
<h3 id="supply-chain-attacks-are-real-1">Supply-chain attacks are real</h3>
<p>SolarWinds. xz. log4shell. When signatures break in transit, you lose the chain of custody.</p>
</div>
<div>
<h3 id="regulation-tightening-1">Regulation tightening</h3>
<p>EU DORA · NIS2 · GDPR. Provable supply-chain control, not best effort.</p>
</div>
<div>
<h3 id="sovereignty-pressure-1">Sovereignty pressure</h3>
<p>Wherever the law puts the boundary — by jurisdiction, sector, or air-gap — software must be deliverable, verifiable, and operable inside it.</p>
</div>
</div>
<div class="footer-line">Open Component Model · ocm.software</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-class="three-col with-footer" data-theme="ocm-neonephos" lang="de-DE" class="three-col with-footer" style="--class:three-col with-footer;--theme:ocm-neonephos;" data-size="16:9">
<h3 id="why-now--v3--fragmentation-led">Why now — V3 · Fragmentation-led</h3>
<h1 id="compliance-retrofits-dont-scale">Compliance retrofits don't scale</h1>
<div class="columns">
<div>
<h3 id="software-delivery-is-fragmented">Software delivery is fragmented</h3>
<p>Many teams, many stacks. Signatures break between them. SBOMs were never built for delivery.</p>
</div>
<div>
<h3 id="regulation-tightening-2">Regulation tightening</h3>
<p>EU DORA · NIS2 · GDPR demand provable supply-chain control — not best effort.</p>
</div>
<div>
<h3 id="sovereignty-pressure-2">Sovereignty pressure</h3>
<p>Wherever the law puts the boundary — by jurisdiction, sector, or air-gap — software must be deliverable, verifiable, and operable inside it.</p>
</div>
</div>
<div class="footer-line">Open Component Model · ocm.software</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-class="diagram with-footer" data-theme="ocm-neonephos" lang="de-DE" class="diagram with-footer" style="--class:diagram with-footer;--theme:ocm-neonephos;" data-size="16:9">
<h3 id="ocm-in-one-picture">OCM in one picture</h3>
<h1 id="pack--sign--transport--deploy">Pack · Sign · Transport · Deploy</h1>
<div class="diagram-stage"><img src="diagrams/05-pack-sign-transport-deploy.svg" alt="Pack Sign Transport Deploy" /></div>
<div class="footer-line">Open Component Model · ocm.software</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-class="tiles with-footer" data-theme="ocm-neonephos" lang="de-DE" class="tiles with-footer" style="--class:tiles with-footer;--theme:ocm-neonephos;" data-size="16:9">
<h3 id="what-ocm-unlocks">What OCM unlocks</h3>
<h1 id="one-model-unlocks-all-of-this">One model unlocks all of this</h1>
<div class="tile-grid">
  <div class="tile">
    <img class="tile-icon" src="diagrams/icons/lock.svg" alt="" />
    <p class="tile-label">Code signing across stacks</p>
    <p class="tile-outcome">Sign once at source; verify everywhere, with no per-stack tooling.</p>
  </div>
  <div class="tile">
    <img class="tile-icon" src="diagrams/icons/cloud-upload.svg" alt="" />
    <p class="tile-label">Air-gapped delivery</p>
    <p class="tile-outcome">Walk a complete component across an air gap; verify at destination.</p>
  </div>
  <div class="tile">
    <img class="tile-icon" src="diagrams/icons/rocket.svg" alt="" />
    <p class="tile-label">Kubernetes-native deployment</p>
    <p class="tile-outcome">OCM controllers deploy components directly into clusters.</p>
  </div>
  <div class="tile">
    <img class="tile-icon" src="diagrams/icons/radar.svg" alt="" />
    <p class="tile-label">Asynchronous security scans</p>
    <p class="tile-outcome">Continuous scanning, even after release; findings tied to component identity.</p>
  </div>
  <div class="tile">
    <img class="tile-icon" src="diagrams/icons/adjustments-horizontal.svg" alt="" />
    <p class="tile-label">Contextual CVE rescoring</p>
    <p class="tile-outcome">Patch what matters in your context, not what a generic feed says.</p>
  </div>
  <div class="tile">
    <img class="tile-icon" src="diagrams/icons/report-analytics.svg" alt="" />
    <p class="tile-label">Automated compliance reporting</p>
    <p class="tile-outcome">Reports composed from SBOD metadata — no spreadsheet drift.</p>
  </div>
</div>
