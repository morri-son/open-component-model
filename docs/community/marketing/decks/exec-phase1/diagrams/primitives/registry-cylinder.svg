<!-- registry-cylinder: classic database/registry icon with three layer rings + label slot. viewBox 0 0 80 100. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <!-- side walls -->
  <path d="M 8 12 V 78" fill="none" stroke="#257DDC" stroke-width="1.5"/>
  <path d="M 72 12 V 78" fill="none" stroke="#257DDC" stroke-width="1.5"/>
  <!-- bottom curve -->
  <path d="M 8 78 a 32 8 0 0 0 64 0" fill="#FFFFFF" stroke="#257DDC" stroke-width="1.5"/>
  <!-- top ellipse (cap) -->
  <ellipse cx="40" cy="12" rx="32" ry="8" fill="#FFFFFF" stroke="#257DDC" stroke-width="1.5"/>
  <!-- layer rings -->
  <path d="M 8 30 a 32 8 0 0 0 64 0" fill="none" stroke="#257DDC" stroke-width="1.5"/>
  <path d="M 8 50 a 32 8 0 0 0 64 0" fill="none" stroke="#257DDC" stroke-width="1.5"/>
  <!-- label slot -->
  <text id="label" x="40" y="96" text-anchor="middle"
        font-family="Aptos, Inter, sans-serif" font-size="11" fill="#257DDC">Registry</text>
</svg>
