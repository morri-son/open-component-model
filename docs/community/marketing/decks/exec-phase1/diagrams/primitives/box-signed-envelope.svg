<!-- box-signed-envelope: rounded rect with double-line border + signed seal in top-right. viewBox 0 0 320 200. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- outer body -->
  <rect x="0.75" y="0.75" width="318.5" height="198.5" rx="12" ry="12"
        fill="#FFFFFF" stroke="#257DDC" stroke-width="1.5"/>
  <!-- inner accent rule, offset 4px -->
  <rect x="4.25" y="4.25" width="311.5" height="191.5" rx="9" ry="9"
        fill="none" stroke="#4CC9F0" stroke-width="0.5"/>
  <!-- signed seal: circle ⌀ 28 in top-right, with a padlock glyph -->
  <g transform="translate(286,20)">
    <circle cx="0" cy="0" r="14" fill="#257DDC"/>
    <!-- padlock body -->
    <rect x="-5" y="-2" width="10" height="8" rx="1.5" ry="1.5" fill="#FFFFFF"/>
    <!-- padlock shackle -->
    <path d="M -3 -2 V -5 a 3 3 0 0 1 6 0 V -2"
          fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
