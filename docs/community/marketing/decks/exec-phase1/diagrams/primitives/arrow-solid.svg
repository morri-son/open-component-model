<!-- arrow-solid: horizontal solid arrow with filled triangular head, 200x24. Indicates transfer/movement. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 24" width="200" height="24">
  <defs>
    <marker id="head-solid" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#257DDC"/>
    </marker>
  </defs>
  <line x1="2" y1="12" x2="186" y2="12"
        stroke="#257DDC" stroke-width="2"
        marker-end="url(#head-solid)"/>
</svg>
