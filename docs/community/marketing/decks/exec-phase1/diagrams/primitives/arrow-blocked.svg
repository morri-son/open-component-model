<!-- arrow-blocked: solid blue arrow with red X overlay. 200x40. Indicates forbidden / unavailable connection. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <defs>
    <marker id="head-blocked" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#257DDC"/>
    </marker>
  </defs>
  <line x1="2" y1="20" x2="186" y2="20"
        stroke="#257DDC" stroke-width="2"
        marker-end="url(#head-blocked)"/>
  <!-- Red X centered -->
  <g stroke="#DC2626" stroke-width="3.5" stroke-linecap="round">
    <line x1="88" y1="8" x2="108" y2="32"/>
    <line x1="108" y1="8" x2="88" y2="32"/>
  </g>
</svg>
