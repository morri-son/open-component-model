<!-- arrow-loop: closed-loop circular arrow, 80x80. Indicates day-2 / subscription / continuous. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <marker id="head-loop" viewBox="0 0 10 10" refX="6" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#257DDC"/>
    </marker>
  </defs>
  <!-- arc covering ~300 degrees, leaving an opening for the head -->
  <path d="M 64 24 A 28 28 0 1 0 60 60"
        fill="none" stroke="#257DDC" stroke-width="2"
        stroke-linecap="round" marker-end="url(#head-loop)"/>
</svg>
