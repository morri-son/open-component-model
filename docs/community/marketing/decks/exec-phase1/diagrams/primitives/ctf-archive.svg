<!-- ctf-archive: Common Transport Format archive. Box with zigzag/tar pattern at top + "CTF" label. 100x100 (80 box + label). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- archive body -->
  <rect x="10.75" y="10.75" width="78.5" height="68.5" rx="4" ry="4"
        fill="#FFFFFF" stroke="#257DDC" stroke-width="1.5"/>
  <!-- zigzag pattern strip near the top suggesting tar/archive layers -->
  <path d="M 14 24 L 22 18 L 30 24 L 38 18 L 46 24 L 54 18 L 62 24 L 70 18 L 78 24 L 86 18"
        fill="none" stroke="#257DDC" stroke-width="1.2"/>
  <!-- horizontal layer lines -->
  <line x1="14" y1="36" x2="86" y2="36" stroke="#257DDC" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="14" y1="50" x2="86" y2="50" stroke="#257DDC" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="14" y1="64" x2="86" y2="64" stroke="#257DDC" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- label slot -->
  <text x="50" y="95" text-anchor="middle"
        font-family="Aptos, Inter, sans-serif" font-size="12" font-weight="700" fill="#257DDC">CTF</text>
</svg>
