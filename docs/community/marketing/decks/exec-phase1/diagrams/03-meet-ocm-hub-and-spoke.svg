<?xml version="1.0" encoding="UTF-8"?>
<!-- 03-meet-ocm-hub-and-spoke.svg — Slide 3: "Meet OCM. One identity, every boundary."
     Hub-and-spoke composition. OCM blob in the middle, three labelled spoke clusters fan out:
       - LEFT  cluster (Artifact types):  OCI, Helm, npm, Binary, Config, … any artifact type   — solid Brand-Blue spokes
       - RIGHT cluster (Regulatory):      DORA, NIS2, CRA                                       — dashed Brand-Blue-Mid spokes
       - BOTTOM cluster (Deployment):     EU (flag), US (flag), Sovereign Cloud (cloud-lock)     — thick Brand-Blue-Night spokes
     Layout: pills are pulled in close to the hub so the radial reads compact and confident.
     Canvas 1760 x 540. Reuses primitive shapes/colors only — no new palette, no new stroke widths.
     Sovereign-Cloud icon mirrors the slide-5 (Pack/Sign/Transport/Deploy) cloud-lock motif. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 560" font-family="Aptos, Inter, system-ui, sans-serif">
  <defs>
    <!-- Per-cluster arrow heads. All three keyed to the same light-black
         (#374151) so spokes read as a single neutral connective layer; the
         strokes themselves keep solid/dashed differentiation per cluster. -->
    <marker id="ah-artifact" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#374151"/>
    </marker>
    <marker id="ah-regulator" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#374151"/>
    </marker>
    <marker id="ah-boundary" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#374151"/>
    </marker>
    <!-- Reusable EU-flag glyph: blue field + 12 yellow stars (simplified as dots in a ring). -->
    <g id="flag-eu">
      <rect x="0" y="0" width="36" height="24" fill="#003399" stroke="#0A1530" stroke-width="0.75"/>
      <!-- 12 stars approximated as small filled dots, ring centred on (18,12), r=8 -->
      <g fill="#FFCC00">
        <circle cx="18" cy="4"     r="1.4"/>
        <circle cx="22"   cy="5.07" r="1.4"/>
        <circle cx="24.93" cy="8"    r="1.4"/>
        <circle cx="26"   cy="12"   r="1.4"/>
        <circle cx="24.93" cy="16"   r="1.4"/>
        <circle cx="22"   cy="18.93" r="1.4"/>
        <circle cx="18"   cy="20"   r="1.4"/>
        <circle cx="14"   cy="18.93" r="1.4"/>
        <circle cx="11.07" cy="16"   r="1.4"/>
        <circle cx="10"   cy="12"   r="1.4"/>
        <circle cx="11.07" cy="8"    r="1.4"/>
        <circle cx="14"   cy="5.07" r="1.4"/>
      </g>
    </g>
    <!-- Reusable US-flag glyph: 7 red + 6 white stripes, blue canton with star dots. -->
    <g id="flag-us">
      <rect x="0" y="0"  width="36" height="24" fill="#FFFFFF" stroke="#0A1530" stroke-width="0.75"/>
      <!-- 7 red stripes -->
      <rect x="0" y="0"     width="36" height="1.85" fill="#DC2626"/>
      <rect x="0" y="3.7"   width="36" height="1.85" fill="#DC2626"/>
      <rect x="0" y="7.4"   width="36" height="1.85" fill="#DC2626"/>
      <rect x="0" y="11.1"  width="36" height="1.85" fill="#DC2626"/>
      <rect x="0" y="14.8"  width="36" height="1.85" fill="#DC2626"/>
      <rect x="0" y="18.5"  width="36" height="1.85" fill="#DC2626"/>
      <rect x="0" y="22.15" width="36" height="1.85" fill="#DC2626"/>
      <!-- canton -->
      <rect x="0" y="0" width="14.4" height="12.92" fill="#1D65B4"/>
      <!-- star dots, 4x3 grid -->
      <g fill="#FFFFFF">
        <circle cx="2.5"  cy="2.4"  r="0.7"/>
        <circle cx="6"    cy="2.4"  r="0.7"/>
        <circle cx="9.5"  cy="2.4"  r="0.7"/>
        <circle cx="12.5" cy="2.4"  r="0.7"/>
        <circle cx="2.5"  cy="6.5"  r="0.7"/>
        <circle cx="6"    cy="6.5"  r="0.7"/>
        <circle cx="9.5"  cy="6.5"  r="0.7"/>
        <circle cx="12.5" cy="6.5"  r="0.7"/>
        <circle cx="2.5"  cy="10.5" r="0.7"/>
        <circle cx="6"    cy="10.5" r="0.7"/>
        <circle cx="9.5"  cy="10.5" r="0.7"/>
        <circle cx="12.5" cy="10.5" r="0.7"/>
      </g>
    </g>
    <!-- Sovereign-cloud glyph: brand-blue cloud + white lock (mirror of slide-5).
         Designed to fit a ~60×40 envelope. -->
    <g id="cloud-lock">
      <!-- Cloud silhouette, filled brand blue (#0F6BFF) -->
      <path d="M 14 32 C 5 32 0 25 0 18 C 0 9 8 3 16 4 C 19 -2 27 -5 32 0 C 37 -5 45 -2 49 4 C 56 4 60 9 60 16 C 60 25 53 32 47 32 Z"
            fill="#0F6BFF" stroke="none"/>
      <!-- Lock shackle (white arc) -->
      <path d="M 25 19 L 25 14 C 25 11 28 9 30 9 C 32 9 35 11 35 14 L 35 19"
            stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Lock body (white rect) -->
      <rect x="22" y="19" width="16" height="11" rx="1.2" ry="1.2" fill="#FFFFFF" stroke="none"/>
      <!-- Keyhole (brand blue) -->
      <circle cx="30" cy="24" r="1.2" fill="#0F6BFF"/>
      <rect x="29.4" y="24" width="1.2" height="3.6" fill="#0F6BFF"/>
    </g>
    <style>
      .eyebrow      { font-size: 13px; font-weight: 700; letter-spacing: 1.4px; fill: #6B7280; }
      .pill-stroke  { fill: #FFFFFF; stroke: #1D65B4; stroke-width: 1.5; }
      .pill-text    { font-size: 14px; font-weight: 700; fill: #1D65B4; }
      .pill-stroke-soft { fill: #FFFFFF; stroke: #1D65B4; stroke-width: 1.5; stroke-dasharray: 4 3; }
      .pill-text-soft   { font-size: 13px; font-weight: 600; fill: #1D65B4; font-style: italic; }
      .reg-stroke   { fill: #FFFFFF; stroke: #1D65B4; stroke-width: 1.5; }
      .reg-text     { font-size: 14px; font-weight: 700; fill: #1D65B4; }
      .bd-fill      { fill: #FFFFFF; stroke: #1D65B4; stroke-width: 1.5; }
      .bd-text      { font-size: 15px; font-weight: 700; fill: #0A1530; }
      .spoke-art    { stroke: #374151; stroke-width: 1.5; fill: none; }
      .spoke-art-soft { stroke: #374151; stroke-width: 1.3; fill: none; stroke-dasharray: 4 3; }
      .spoke-reg    { stroke: #374151; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
      .spoke-bnd    { stroke: #374151; stroke-width: 1.75; fill: none; }
      .footer       { font-size: 12px; font-weight: 500; font-style: italic; fill: #1D65B4; letter-spacing: 0.2px; }
    </style>
  </defs>

  <!-- =======================================================================
       HUB — OCM-component icon (e-ticket preset, mini variant) on a soft halo.
       The hexagon backdrop has been removed: with the e-ticket as the hub
       primitive, the icon itself carries the "this is the OCM component"
       reading and the hex was redundant chrome. The halo (translucent blue
       circles) keeps the radial centre legible against the spoke arrows.
       Centre at (880, 250). Icon ~140 wide × 80 tall, with v1.0.0 on the stub.
       Same icon family as slide 7b at "full" scale — slide-3 hub and
       slide-7b component glyphs visually rhyme.
       ======================================================================= -->
  <g transform="translate(802,220)">
    <!-- Two-circle hub target. Outer circle (r=104) is the canonical
         termination radius for every incoming arrow on this slide; inner
         circle (r=88) fully encloses the e-ticket icon (icon corner at
         hub-local (78,30), distance from centre ≈ 83.6). Hub centre in
         slide coords: (880, 250). -->
    <circle cx="78" cy="30" r="104" fill="#257DDC" fill-opacity="0.06"/>
    <circle cx="78" cy="30" r="88"  fill="#257DDC" fill-opacity="0.10"/>
    <!-- OCM-component icon: single rounded box. The version stub is no
         longer a separate rect — instead, a faint grey fill (#F3F4F6)
         occupies the stub area inside the same box, separated from the
         name area by a hairline divider in #E5E7EB. One enclosing stroke
         around the whole shape so it reads as one component, with the
         version visually demoted (sub-region, not a torn ticket stub).
         Icon spans x=0..156, y=0..60; visually centred on the hub circles
         at hub-local (78, 30). -->
    <g>
      <!-- Faint grey fill in the stub area (100..156). Drawn first so the
           outer stroke (next) overlays its right/top/bottom edges cleanly. -->
      <rect x="100" y="0" width="56" height="60" rx="0"
            fill="#F3F4F6" stroke="none"/>
      <!-- Single enclosing rect: white-on-grey is achieved by the stub
           fill above peeking through; this rect just paints the body area
           white and carries the unified outer stroke. -->
      <rect x="0" y="0" width="100" height="60" rx="10"
            fill="#FFFFFF" stroke="none"/>
      <!-- Outer stroke spanning the full 156-wide envelope. -->
      <rect x="0" y="0" width="156" height="60" rx="10"
            fill="none" stroke="#1D65B4" stroke-width="2.2"/>
      <!-- Hairline divider between name area and version sub-region. -->
      <line x1="100" y1="6" x2="100" y2="54" stroke="#E5E7EB"
            stroke-width="1.2"/>
      <!-- lock badge on the body, centred vertically -->
      <circle cx="24" cy="30" r="14" fill="#1D65B4"/>
      <g fill="none" stroke="#FFFFFF" stroke-width="1.6"
         stroke-linecap="round" stroke-linejoin="round"
         transform="translate(11,18) scale(1.08)">
        <path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6"/>
        <circle cx="12" cy="16" r="1"/>
        <path d="M8 11v-4a4 4 0 1 1 8 0v4"/>
      </g>
      <!-- name strip on body (abstract bars at this scale — no full URL) -->
      <rect x="46" y="22" width="44" height="5" rx="2" fill="#1D65B4"/>
      <rect x="46" y="34" width="32" height="5" rx="2" fill="#5cd6ff"/>
      <!-- version on stub (text centre at stub centre x=128) -->
      <text x="128" y="36" text-anchor="middle" font-size="14"
            font-weight="700" fill="#0a3a99" letter-spacing="1"
            font-family="Aptos, Inter, sans-serif">v1.0.0</text>
    </g>
  </g>

  <!-- =======================================================================
       CLUSTER 1 — ARTIFACT TYPES   (LEFT, pulled in close to hub)
       Pills 160 wide, column x = 240. Right edge of pills = 400. Hub left ~ 828.
       ======================================================================= -->
  <g>
    <text x="240" y="38" class="eyebrow">EVERY ARTIFACT TYPE</text>
    <line x1="240" y1="50" x2="420" y2="50" stroke="#257DDC" stroke-width="2"/>

    <g transform="translate(240,62)">
      <rect class="pill-stroke" x="0.75" y="0.75" width="158.5" height="34.5" rx="18" ry="18"/>
      <text class="pill-text" x="80" y="23" text-anchor="middle">OCI</text>
    </g>
    <g transform="translate(240,114)">
      <rect class="pill-stroke" x="0.75" y="0.75" width="158.5" height="34.5" rx="18" ry="18"/>
      <text class="pill-text" x="80" y="23" text-anchor="middle">Helm</text>
    </g>
    <g transform="translate(240,166)">
      <rect class="pill-stroke" x="0.75" y="0.75" width="158.5" height="34.5" rx="18" ry="18"/>
      <text class="pill-text" x="80" y="23" text-anchor="middle">npm</text>
    </g>
    <g transform="translate(240,218)">
      <rect class="pill-stroke" x="0.75" y="0.75" width="158.5" height="34.5" rx="18" ry="18"/>
      <text class="pill-text" x="80" y="23" text-anchor="middle">Binary</text>
    </g>
    <g transform="translate(240,270)">
      <rect class="pill-stroke" x="0.75" y="0.75" width="158.5" height="34.5" rx="18" ry="18"/>
      <text class="pill-text" x="80" y="23" text-anchor="middle">Config</text>
    </g>
    <g transform="translate(240,322)">
      <rect class="pill-stroke-soft" x="0.75" y="0.75" width="158.5" height="34.5" rx="18" ry="18"/>
      <text class="pill-text-soft" x="80" y="22" text-anchor="middle">… any artifact type</text>
    </g>

    <!-- Spokes: from each pill's right edge (x=400) to the hub's outer
         target circle (centre 880,250 r=104). All endpoints lie ON the
         outer circle so the arrowheads land exactly at its perimeter. -->
    <path class="spoke-art"      d="M400 80  C 560 80,  640 200, 779.3 224"  marker-end="url(#ah-artifact)"/>
    <path class="spoke-art"      d="M400 132 C 560 132, 640 220, 776.5 240"  marker-end="url(#ah-artifact)"/>
    <path class="spoke-art"      d="M400 184 C 560 184, 660 240, 776 252"    marker-end="url(#ah-artifact)"/>
    <path class="spoke-art"      d="M400 236 C 560 236, 660 256, 777 264"    marker-end="url(#ah-artifact)"/>
    <path class="spoke-art"      d="M400 288 C 560 288, 660 274, 779.3 276"  marker-end="url(#ah-artifact)"/>
    <path class="spoke-art-soft" d="M400 340 C 560 340, 640 305, 784 290"    marker-end="url(#ah-artifact)"/>
  </g>

  <!-- =======================================================================
       CLUSTER 2 — DEPLOYMENT BOUNDARIES   (RIGHT, pulled in close to hub)
       Tiles 180 x 70, all at the same scale. Sovereign-cloud sets the
       width (its label "Sovereign Cloud" is the longest); EU/US match it
       so the column reads as one rhythm. Column at x=1380.
       ======================================================================= -->
  <g>
    <text x="1470" y="38" text-anchor="middle" class="eyebrow">EVERY DEPLOYMENT BOUNDARY</text>
    <line x1="1380" y1="50" x2="1560" y2="50" stroke="#1D65B4" stroke-width="2"/>

    <!-- EU tile: flag(36) + label, group centred inside the 180-wide tile.
         Group width ≈ flag(36) + gap(12) + "EU"(~26) = 74; start x = (180-74)/2 = 53. -->
    <g transform="translate(1380,80)">
      <rect class="bd-fill" x="0" y="0" width="180" height="70" rx="10"/>
      <g transform="translate(53,23)"><use href="#flag-eu"/></g>
      <text class="bd-text" x="103" y="42">EU</text>
    </g>
    <!-- US tile: same centring rule as EU -->
    <g transform="translate(1380,200)">
      <rect class="bd-fill" x="0" y="0" width="180" height="70" rx="10"/>
      <g transform="translate(53,23)"><use href="#flag-us"/></g>
      <text class="bd-text" x="103" y="42">US</text>
    </g>
    <!-- Sovereign Cloud tile: cloud-lock(60w) on left, two-line label
         centred to its right. -->
    <g transform="translate(1380,320)">
      <rect class="bd-fill" x="0" y="0" width="180" height="70" rx="10"/>
      <g transform="translate(14,20)"><use href="#cloud-lock"/></g>
      <text class="bd-text" x="120" y="32">Sovereign</text>
      <text class="bd-text" x="120" y="52">Cloud</text>
    </g>

    <!-- Spokes: hub → boundary tiles. Starts on hub outer circle (880,250 r=104)
         at angles -30°/0°/+30°. Endpoints at each tile's left edge (x=1380)
         on the tile's vertical centre line. Pfeile zeigen NACH AUSSEN. -->
    <path class="spoke-bnd" d="M970.07 198 C 1080 180, 1220 130, 1378 115" marker-end="url(#ah-boundary)"/>
    <path class="spoke-bnd" d="M984 250    C 1080 240, 1220 230, 1378 235" marker-end="url(#ah-boundary)"/>
    <path class="spoke-bnd" d="M970.07 302 C 1080 320, 1220 340, 1378 355" marker-end="url(#ah-boundary)"/>
  </g>

  <!-- =======================================================================
       CLUSTER 3 — COMPLIANCE FRAMEWORKS   (BOTTOM, pulled away from hub for
       breathing room; eyebrow lives ABOVE the pills in the conventional
       header position). Frameworks flow UPWARD into the hub — they are
       the central force, not a side cluster.
       ======================================================================= -->
  <g>
    <text x="880" y="430" text-anchor="middle" class="eyebrow">EVERY COMPLIANCE FRAMEWORK</text>
    <line x1="750" y1="438" x2="1010" y2="438" stroke="#1D65B4" stroke-width="2"/>

    <!-- DORA pill: centre x=490, top y=455. Bullet indicators removed —
         the eyebrow already names the cluster, the pill itself just labels
         the framework. Text now centred at pill mid (x=90). -->
    <g transform="translate(400,455)">
      <rect class="reg-stroke" x="0.75" y="0.75" width="178.5" height="38.5" rx="20" ry="20"/>
      <text class="reg-text" x="90" y="25" text-anchor="middle">DORA</text>
    </g>
    <!-- NIS2 pill: centre x=880 -->
    <g transform="translate(790,455)">
      <rect class="reg-stroke" x="0.75" y="0.75" width="178.5" height="38.5" rx="20" ry="20"/>
      <text class="reg-text" x="90" y="25" text-anchor="middle">NIS2</text>
    </g>
    <!-- CRA pill: centre x=1270 -->
    <g transform="translate(1180,455)">
      <rect class="reg-stroke" x="0.75" y="0.75" width="178.5" height="38.5" rx="20" ry="20"/>
      <text class="reg-text" x="90" y="25" text-anchor="middle">CRA</text>
    </g>

    <!-- Spokes: frameworks → hub. Endpoints on hub outer circle (880,250
         r=104) at angles 225°/270°/315°. Starts at each pill's top edge
         centre (y=455). -->
    <path class="spoke-reg" d="M490 455 C 600 410, 740 360, 806.46 323.54" marker-end="url(#ah-regulator)"/>
    <path class="spoke-reg" d="M880 455 C 880 420, 880 380, 880 354"        marker-end="url(#ah-regulator)"/>
    <path class="spoke-reg" d="M1270 455 C 1160 410, 1020 360, 953.54 323.54" marker-end="url(#ah-regulator)"/>
  </g>

  <!-- =======================================================================
       FOOTER LINE — supplementary regimes off-canvas.
       ======================================================================= -->
  <text x="880" y="552" text-anchor="middle" class="footer">plus FedRAMP/FISMA, BSI C5, SecNumCloud — and the regimes specific to your sector.</text>
</svg>
