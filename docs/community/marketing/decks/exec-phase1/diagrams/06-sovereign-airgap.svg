<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" role="img" aria-label="Sovereign-ready: trust, but verify">
  <defs>
    <linearGradient id="pillarFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f4f6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="brandFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5cd6ff"/>
      <stop offset="100%" stop-color="#0f6bff"/>
    </linearGradient>

    <!-- ico-lock uses currentColor so each <use> can paint it via the color attribute. -->
    <symbol id="ico-lock" viewBox="0 0 24 24"><g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13a2 2 0 0 1 2 -2h10a2 2 0 0 1 2 2v6a2 2 0 0 1 -2 2h-10a2 2 0 0 1 -2 -2v-6"/><path d="M11 16a1 1 0 1 0 2 0a1 1 0 0 0 -2 0"/><path d="M8 11v-4a4 4 0 1 1 8 0v4"/></g></symbol>
    <symbol id="ico-shield" viewBox="0 0 24 24"><g fill="none" stroke="#0f6bff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11.46 20.846a12 12 0 0 1 -7.96 -14.846a12 12 0 0 0 8.5 -3a12 12 0 0 0 8.5 3a12 12 0 0 1 -.09 7.06"/><path d="M15 19l2 2l4 -4"/></g></symbol>
    <symbol id="ico-cluster" viewBox="0 0 24 24"><g fill="none" stroke="#0f6bff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l3 -3l3 3l3 -3l3 3l3 -3l3 3"/><path d="M3 19l3 -3l3 3l3 -3l3 3l3 -3l3 3"/><path d="M3 5l3 -3l3 3l3 -3l3 3l3 -3l3 3"/></g></symbol>
    <symbol id="ico-registry" viewBox="0 0 24 24"><g fill="none" stroke="#0f6bff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6a8 3 0 0 0 16 0v-6"/><path d="M4 12v6a8 3 0 0 0 16 0v-6"/></g></symbol>
  </defs>

  <g font-family="Aptos, Inter, sans-serif">

    <!-- Source side (left) -->
    <g transform="translate(80,100)">
      <text x="0" y="40" font-size="20" font-weight="700" fill="#6b7280" letter-spacing="3">SOURCE</text>
      <text x="0" y="78" font-size="32" font-weight="700" fill="#0a3a99">Pack · Sign</text>

      <!-- Source registry -->
      <g transform="translate(0,140)">
        <rect width="320" height="200" rx="14" fill="url(#pillarFill)" stroke="#e8f0ff" stroke-width="2" filter="url(#softShadow)"/>
        <use href="#ico-registry" x="20" y="20" width="56" height="56" stroke="#0f6bff"/>
        <text x="100" y="50" font-size="20" font-weight="700" fill="#0a3a99">Public registry</text>
        <text x="100" y="76" font-size="14" fill="#6b7280">Build artifacts live here.</text>
        <!-- Signed component glyph — single box, version sub-region in
             faint grey. Mirrors the slide-3 hub glyph: one outer stroke,
             body white, stub fill #F3F4F6, hairline divider in #E5E7EB
             between name and version. 290×70 footprint preserved so the
             arrow endpoint at x=385 stays valid. -->
        <g transform="translate(15,110)">
          <!-- Stub area fill (faint grey), drawn first -->
          <rect x="220" y="0" width="70" height="70" rx="0"
                fill="#F3F4F6" stroke="none"/>
          <!-- Body area fill (white) -->
          <rect x="0" y="0" width="220" height="70" rx="10"
                fill="#FFFFFF" stroke="none"/>
          <!-- Single enclosing stroke -->
          <rect x="0" y="0" width="290" height="70" rx="10"
                fill="none" stroke="#0f6bff" stroke-width="2"/>
          <!-- Hairline divider -->
          <line x1="220" y1="6" x2="220" y2="64" stroke="#E5E7EB"
                stroke-width="1.4"/>
          <!-- Lock badge on body -->
          <circle cx="30" cy="35" r="18" fill="#0f6bff"/>
          <use href="#ico-lock" x="14" y="19" width="32" height="32" color="#ffffff"/>
          <!-- Component name + role on body -->
          <text x="62" y="32" font-size="14" font-weight="700" fill="#0a3a99">github.com/acme/app</text>
          <text x="62" y="52" font-size="13" fill="#6b7280">signed component</text>
          <!-- Version on stub -->
          <text x="255" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#0a3a99" letter-spacing="1">v1.0.0</text>
        </g>
      </g>
    </g>

    <!-- Trust boundary line — centred between source registry (right edge x=400)
         and air-gapped container (left edge x=900); midpoint x=650.
         Vertically extends to the bottom of the air-gapped container (y=720)
         so the boundary visually frames the entire sovereign zone. -->
    <g transform="translate(570,80)">
      <line x1="80" y1="40" x2="80" y2="640" stroke="#0f6bff" stroke-width="2.5" stroke-dasharray="10 8"/>
      <text x="80" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#0f6bff" letter-spacing="3">TRUST BOUNDARY</text>
    </g>

    <!-- Crossing arrow rendered LAST (after all boxes) so it draws on top
         of the air-gapped container's dashed border. Otherwise the dashed
         line would z-overlap the arrow at x=900 and the connection appears
         to stop at the air-gap edge instead of reaching the component.
         (See block at the bottom of this <g>.) -->

    <!-- Target side (right) — sovereign / air-gapped -->
    <g transform="translate(900,100)">
      <text x="0" y="40" font-size="20" font-weight="700" fill="#0f6bff" letter-spacing="3">SOVEREIGN TARGET</text>
      <text x="0" y="78" font-size="32" font-weight="700" fill="#0a3a99">Verify · Deploy</text>

      <g transform="translate(0,140)">
        <rect width="600" height="480" rx="14" fill="#ffffff" stroke="#0f6bff" stroke-width="2.5" stroke-dasharray="8 6"/>
        <text x="20" y="36" font-size="13" font-weight="700" fill="#0f6bff" letter-spacing="2">AIR-GAPPED</text>

        <!-- Receiving component — IDENTICAL to source-side glyph above so
             the journey reads "same thing, different location." Same single-
             box preset, same dimensions, same coordinates. The arrow ends
             at this box's left edge (x=1055 absolute = translate(900) +
             translate(155) + 0). -->
        <g transform="translate(155,60)">
          <rect x="220" y="0" width="70" height="70" rx="0"
                fill="#F3F4F6" stroke="none"/>
          <rect x="0" y="0" width="220" height="70" rx="10"
                fill="#FFFFFF" stroke="none"/>
          <rect x="0" y="0" width="290" height="70" rx="10"
                fill="none" stroke="#0f6bff" stroke-width="2"/>
          <line x1="220" y1="6" x2="220" y2="64" stroke="#E5E7EB"
                stroke-width="1.4"/>
          <circle cx="30" cy="35" r="18" fill="#0f6bff"/>
          <use href="#ico-lock" x="14" y="19" width="32" height="32" color="#ffffff"/>
          <text x="62" y="32" font-size="14" font-weight="700" fill="#0a3a99">github.com/acme/app</text>
          <text x="62" y="52" font-size="13" fill="#6b7280">signed component</text>
          <text x="255" y="40" text-anchor="middle" font-size="14" font-weight="700" fill="#0a3a99" letter-spacing="1">v1.0.0</text>
        </g>

        <!-- "Identity stays · signature stays" caption removed — its claim
             is now consolidated into the bottom accent caption
             (SAME IDENTITY · SAME SIGNATURE · ANY LOCATION). Reduces caption
             count on the slide so the new TRANSPORT label on the arrow has
             room to breathe. -->

        <!-- Three local consumers, all verifying. Each tile carries a small
             green check-badge in place of the prior "verify ✓" text — green
             is the only off-brand colour on the slide, used here as a deck-
             wide visual exception to stamp the moment of trust on each tile.
             Badge: filled circle r=11 in #16A34A (muted professional green),
             white tick stroke. -->
        <g transform="translate(30,170)">
          <rect width="170" height="120" rx="10" fill="url(#pillarFill)" stroke="#e8f0ff" stroke-width="2"/>
          <use href="#ico-registry" x="62" y="14" width="46" height="46" stroke="#0f6bff"/>
          <text x="85" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#0a3a99">Local registry</text>
          <g transform="translate(85,100)">
            <circle r="11" fill="#16A34A"/>
            <path d="M -5 0 L -1.5 4 L 5 -4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </g>
        <g transform="translate(216,170)">
          <rect width="170" height="120" rx="10" fill="url(#pillarFill)" stroke="#e8f0ff" stroke-width="2"/>
          <use href="#ico-cluster" x="62" y="14" width="46" height="46" stroke="#0f6bff"/>
          <text x="85" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#0a3a99">K8s cluster</text>
          <g transform="translate(85,100)">
            <circle r="11" fill="#16A34A"/>
            <path d="M -5 0 L -1.5 4 L 5 -4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </g>
        <g transform="translate(402,170)">
          <rect width="170" height="120" rx="10" fill="url(#pillarFill)" stroke="#e8f0ff" stroke-width="2"/>
          <use href="#ico-shield" x="62" y="14" width="46" height="46" stroke="#0f6bff"/>
          <text x="85" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#0a3a99">Auditor</text>
          <g transform="translate(85,100)">
            <circle r="11" fill="#16A34A"/>
            <path d="M -5 0 L -1.5 4 L 5 -4" fill="none" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </g>
        </g>

        <text x="300" y="330" text-anchor="middle" font-size="20" font-weight="700" fill="#0a3a99">Trust, but verify.</text>
        <text x="300" y="360" text-anchor="middle" font-size="16" fill="#6b7280">No callback to source. Day-2 ops included.</text>

        <!-- Bottom accent: light-blue background rect sized to fit the
             ALL-CAPS letter-spaced caption with breathing room on both sides.
             Caption widened to consolidate the "identity stays / signature
             stays" claim previously sitting next to the landing component —
             one caption now carries the full thesis. Rect width 320→480,
             x=140→60, kept centred at x=300 inside the 600-wide air-gap
             container (60px margin both sides). -->
        <rect x="60" y="400" width="480" height="42" rx="6" fill="#e8f0ff"/>
        <text x="300" y="428" text-anchor="middle" font-size="14" font-weight="700" fill="#0a3a99" letter-spacing="2">SAME IDENTITY · SAME SIGNATURE · ANY LOCATION</text>
      </g>
    </g>

    <!-- Crossing arrow rendered LAST so it draws on top of the air-gapped
         container's dashed border. Curved Bezier from the right edge of the
         source-registry component glyph (x=385, y=385) directly to the left
         edge of the landing component inside the air-gapped zone
         (x=1055, y=335). Connects identical component glyphs end-to-end. -->
    <path d="M 385 385 C 600 385, 850 335, 1055 335"
          fill="none" stroke="url(#brandFill)" stroke-width="3.5"/>
    <polygon points="1055,335 1033,323 1033,347" fill="#0f6bff"/>

    <!-- TRANSPORT label sits above the arrow's mid-flight, just to the right
         of the trust boundary (boundary at x=650; arrow apex around x=720).
         Anchors the diagram to the canonical Pack · Sign · Transport · Deploy
         four-step from slide 6: this slide *is* the Transport step in motion.
         Rendered after the arrow so it draws on top — same z-order reason
         the arrow itself is the last layer. Same letter-spaced caps style as
         the bottom accent caption so the two captions read as one visual
         family (one labels the action, one states the consequence). -->
    <text x="735" y="340" text-anchor="middle" font-size="32" font-weight="700" fill="#0a3a99">Transport</text>
  </g>
</svg>
