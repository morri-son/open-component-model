<?xml version="1.0" encoding="UTF-8"?>
<!-- 06-sovereign-airgap-v2.svg — Variant 2: explicit two-zone diagram with
     thick air-gap divider and a closed-loop arrow inside the sovereign zone
     showing day-2 ops happen entirely on the right side.
     Left: source (CI/CD signs and packs).
     Air gap: physical media transfer.
     Right: sovereign zone — receive, verify, deploy, scale, day-2 — all closed-loop.
     viewBox: 0 0 1760 540 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 540" font-family="Aptos, Inter, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#257DDC"/>
    </marker>
    <marker id="arrCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4CC9F0"/>
    </marker>
  </defs>

  <!-- LEFT ZONE: source (light bg) -->
  <g transform="translate(40,40)">
    <rect width="640" height="460" rx="14" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
    <text x="32" y="36" font-size="13" font-weight="700" letter-spacing="1.5" fill="#6B7280">SOURCE</text>
    <text x="32" y="60" font-size="20" font-weight="700" fill="#000">Build · Sign · Pack</text>

    <!-- Build -->
    <g transform="translate(32,100)">
      <rect width="180" height="60" rx="8" fill="white" stroke="#257DDC" stroke-width="1.5"/>
      <text x="90" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1D65B4">CI / build</text>
      <line x1="180" y1="30" x2="220" y2="30" stroke="#257DDC" stroke-width="2" marker-end="url(#arr)"/>
      <rect x="220" y="0" width="180" height="60" rx="8" fill="white" stroke="#257DDC" stroke-width="1.5"/>
      <text x="310" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1D65B4">sign</text>
    </g>

    <!-- Pack into envelope -->
    <g transform="translate(32,200)">
      <rect width="400" height="100" rx="10" fill="white" stroke="#257DDC" stroke-width="2"/>
      <rect x="6" y="6" width="388" height="88" rx="6" fill="none" stroke="#4CC9F0" stroke-width="0.5"/>
      <circle cx="378" cy="22" r="14" fill="#257DDC"/>
      <path d="M373,24 l4,4 l7,-8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="20" y="34" font-size="13" font-weight="700" fill="#1D65B4">SIGNED COMPONENT</text>

      <!-- Pills inside -->
      <g transform="translate(20,52)">
        <rect x="0" y="0" width="48" height="24" rx="12" fill="#F3F4F6" stroke="#257DDC" stroke-width="1"/>
        <text x="24" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#257DDC">OCI</text>
        <rect x="56" y="0" width="48" height="24" rx="12" fill="#F3F4F6" stroke="#257DDC" stroke-width="1"/>
        <text x="80" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#257DDC">Helm</text>
        <rect x="112" y="0" width="48" height="24" rx="12" fill="#F3F4F6" stroke="#257DDC" stroke-width="1"/>
        <text x="136" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#257DDC">Bin</text>
        <rect x="168" y="0" width="48" height="24" rx="12" fill="#F3F4F6" stroke="#257DDC" stroke-width="1"/>
        <text x="192" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#257DDC">Cfg</text>
        <rect x="224" y="0" width="56" height="24" rx="12" fill="#F3F4F6" stroke="#4CC9F0" stroke-width="1"/>
        <text x="252" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#1D65B4">SBOM</text>
      </g>
    </g>

    <!-- Pack to CTF -->
    <g transform="translate(32,360)">
      <rect width="400" height="60" rx="8" fill="white" stroke="#257DDC" stroke-width="1.5"/>
      <text x="200" y="36" text-anchor="middle" font-size="13" fill="#1D65B4">→ pack into CTF (Common Transport Format)</text>
    </g>
  </g>

  <!-- AIR GAP DIVIDER -->
  <g transform="translate(720,30)">
    <rect x="0" y="0" width="80" height="480" fill="#0A1530"/>
    <rect x="34" y="0" width="12" height="480" fill="#F59E0B"/>
    <text x="40" y="240" text-anchor="middle" font-size="14" font-weight="700" letter-spacing="2" fill="white" transform="rotate(-90,40,240)">A I R   G A P</text>
    <!-- USB / disk icon at top to suggest physical transfer -->
    <g transform="translate(40,40)">
      <rect x="-12" y="-8" width="24" height="16" rx="2" fill="white" stroke="#0A1530" stroke-width="1"/>
      <rect x="-4" y="-14" width="8" height="6" fill="white" stroke="#0A1530" stroke-width="1"/>
    </g>
    <text x="40" y="76" text-anchor="middle" font-size="10" fill="white">CTF</text>
  </g>

  <!-- RIGHT ZONE: sovereign cloud (dark bg) -->
  <g transform="translate(840,40)">
    <rect width="880" height="460" rx="14" fill="#0A1530" stroke="#257DDC" stroke-width="2"/>
    <text x="32" y="36" font-size="13" font-weight="700" letter-spacing="1.5" fill="#4CC9F0">SOVEREIGN CLOUD</text>
    <text x="32" y="60" font-size="20" font-weight="700" fill="white">Receive · Verify · Deploy · Scale · Day-2</text>

    <!-- Step boxes -->
    <g transform="translate(32,90)">
      <!-- Receive -->
      <rect width="160" height="60" rx="8" fill="white" stroke="#4CC9F0" stroke-width="1.5"/>
      <text x="80" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1D65B4">receive CTF</text>

      <!-- Verify -->
      <rect x="180" y="0" width="160" height="60" rx="8" fill="white" stroke="#4CC9F0" stroke-width="1.5"/>
      <text x="260" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1D65B4">verify signature</text>
      <text x="260" y="50" text-anchor="middle" font-size="11" fill="#6B7280">no callback upstream</text>

      <!-- Registry -->
      <rect x="360" y="0" width="160" height="60" rx="8" fill="white" stroke="#4CC9F0" stroke-width="1.5"/>
      <text x="440" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1D65B4">internal registry</text>

      <!-- Deploy -->
      <rect x="540" y="0" width="160" height="60" rx="8" fill="white" stroke="#4CC9F0" stroke-width="1.5"/>
      <text x="620" y="36" text-anchor="middle" font-size="14" font-weight="700" fill="#1D65B4">deploy</text>

      <line x1="160" y1="30" x2="180" y2="30" stroke="#4CC9F0" stroke-width="2" marker-end="url(#arrCyan)"/>
      <line x1="340" y1="30" x2="360" y2="30" stroke="#4CC9F0" stroke-width="2" marker-end="url(#arrCyan)"/>
      <line x1="520" y1="30" x2="540" y2="30" stroke="#4CC9F0" stroke-width="2" marker-end="url(#arrCyan)"/>
    </g>

    <!-- Closed-loop day-2 -->
    <g transform="translate(32,200)">
      <rect width="816" height="180" rx="10" fill="#1A2540" stroke="#4CC9F0" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="20" y="32" font-size="13" font-weight="700" letter-spacing="1.2" fill="#4CC9F0">CLOSED-LOOP DAY-2 OPS</text>
      <text x="20" y="58" font-size="14" fill="white">Subscribe to the component. Pull upgrades on your schedule.</text>
      <text x="20" y="80" font-size="14" fill="white">Scale across regions, all without reaching back upstream.</text>

      <!-- Loop arrow visual -->
      <g transform="translate(620,100)">
        <circle cx="0" cy="0" r="50" fill="none" stroke="#4CC9F0" stroke-width="2.5" stroke-dasharray="3,2"/>
        <path d="M -50 0 L -42 -10 L -36 0 Z" fill="#4CC9F0" transform="rotate(90)"/>
        <text x="0" y="6" text-anchor="middle" font-size="13" font-weight="700" fill="#4CC9F0">SCALE</text>
      </g>

      <text x="20" y="120" font-size="13" fill="#6B7280">no inbound network · no upstream callback · no external dependencies</text>
      <text x="20" y="140" font-size="13" font-weight="700" fill="#4CC9F0">Validated end-to-end in the project's sovereign conformance scenario.</text>
    </g>

    <!-- Cluster glyph -->
    <g transform="translate(700,420)">
      <rect x="0" y="0" width="60" height="40" rx="6" fill="white" stroke="#4CC9F0" stroke-width="1.5"/>
      <rect x="8" y="6" width="14" height="14" rx="2" fill="white" stroke="#4CC9F0" stroke-width="1"/>
      <rect x="38" y="6" width="14" height="14" rx="2" fill="white" stroke="#4CC9F0" stroke-width="1"/>
      <rect x="23" y="20" width="14" height="14" rx="2" fill="white" stroke="#4CC9F0" stroke-width="1"/>
    </g>
    <text x="780" y="446" font-size="13" fill="#4CC9F0">on-prem · sovereign · always inside the boundary</text>
  </g>

  <!-- Block-back arrow showing no callback to source -->
  <g transform="translate(900,500)">
    <line x1="0" y1="0" x2="-200" y2="0" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="-100" y1="-12" x2="-100" y2="12" stroke="#DC2626" stroke-width="3"/>
    <line x1="-110" y1="-2" x2="-90" y2="-2" stroke="#DC2626" stroke-width="3"/>
    <text x="-100" y="32" text-anchor="middle" font-size="11" fill="#DC2626">no upstream callback</text>
  </g>
</svg>
